# ===== Namespace =====
apiVersion: v1
kind: Namespace
metadata:
  name: static-app
  labels:
    name: static-app
    app: static-app

---
# ===== Service Account =====
apiVersion: v1
kind: ServiceAccount
metadata:
  name: static-app
  namespace: static-app
  labels:
    app: static-app

---
# ===== ConfigMap =====
apiVersion: v1
kind: ConfigMap
metadata:
  name: static-app-config
  namespace: static-app
  labels:
    app: static-app
data:
  ENVIRONMENT: "production"
  APP_NAME: "static-app"

---
# ===== Deployment =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-app
  namespace: static-app
  labels:
    app: static-app
    version: v1
    managed-by: argocd
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: static-app

  template:
    metadata:
      labels:
        app: static-app
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/health"

    spec:
      serviceAccountName: static-app
      securityContext:
        fsGroup: 101
        runAsNonRoot: true
        runAsUser: 101

      containers:
      - name: static-app
        image: acr.azurecr.io/static-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80
          name: http
          protocol: TCP

        envFrom:
        - configMapRef:
            name: static-app-config

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /index.html
            port: 80
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1

        readinessProbe:
          httpGet:
            path: /index.html
            port: 80
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
          successThreshold: 1

        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/nginx

      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - static-app
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
# ===== Service =====
apiVersion: v1
kind: Service
metadata:
  name: static-app-service
  namespace: static-app
  labels:
    app: static-app
  annotations:
    description: "Load balancer service for static-app"

spec:
  type: LoadBalancer
  selector:
    app: static-app

  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP

  sessionAffinity: None
  externalTrafficPolicy: Local

---
# ===== HorizontalPodAutoscaler =====
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: static-app-hpa
  namespace: static-app
  labels:
    app: static-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: static-app

  minReplicas: 3
  maxReplicas: 10

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15

    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
# ===== PodDisruptionBudget =====
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: static-app-pdb
  namespace: static-app
  labels:
    app: static-app

spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: static-app

