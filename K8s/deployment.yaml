apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-app
  namespace: user-app
  labels:
    app: user-app
spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-app

  template:
    metadata:
      labels:
        app: user-app
    spec:
      containers:
        - name: user-app
          image: YOUR_DOCKER_USERNAME/user-app:latest
          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20