apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: static-app-project
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io

spec:
  description: Static App Project

  # Allowed source repositories
  sourceRepos:
  - https://github.com/YOUR_USERNAME/Test-Static-Application
  - 'https://prometheus-community.github.io/helm-charts'  # For monitoring
  - 'https://charts.bitnami.com/bitnami'  # For common charts

  # Allowed deployment targets
  destinations:
  - namespace: 'static-app'
    server: https://kubernetes.default.svc
  - namespace: 'argocd'
    server: https://kubernetes.default.svc
  - namespace: 'monitoring'
    server: https://kubernetes.default.svc
  - namespace: 'kube-system'
    server: https://kubernetes.default.svc

  # Cluster resource whitelist
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'

  # Namespace resource blacklist (optional - nothing is denied by default)
  # namespaceResourceBlacklist:
  # - group: ''
  #   kind: 'ResourceQuota'
  # - group: ''
  #   kind: 'LimitRange'
  # - group: ''
  #   kind: 'NetworkPolicy'

  # Namespace resource whitelist
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'

  # Deny list of resources that cannot be deployed
  namespaceResourceDenylist:
  - group: ''
    kind: 'ResourceQuota'
  - group: ''
    kind: 'LimitRange'

  # Orphaned resources (set retention policy)
  orphanedResources:
    warn: true
    ignore:
    - group: 'apps'
      kind: 'StatefulSet'