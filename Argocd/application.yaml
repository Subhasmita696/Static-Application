apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-app
  namespace: argocd
spec:
  project: user-app-project

  source:
    repoURL: https://github.com/YOUR_USERNAME/user-management-devops.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: user-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true